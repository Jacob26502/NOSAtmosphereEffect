name: Telegram Notification

# Trigger this workflow when 'Android Release' completes
on:
  workflow_run:
    workflows: ["Android Release"]
    branches: [master]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    # Only run if the build was successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Release Details
        id: get_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Fetch details of the LATEST release (which was just created)
          gh release view --json tagName,url > release_info.json
          
          # 2. Parse the Tag and URL using jq (installed by default on ubuntu)
          TAG=$(jq -r .tagName release_info.json)
          URL=$(jq -r .url release_info.json)
          
          echo "Found latest release: $TAG"
          
          # 3. Save to Environment Variables for the next steps
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "URL=$URL" >> $GITHUB_ENV

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download assets specifically for the tag we just found
          gh release download ${{ env.TAG }} --dir ./release_assets

      - name: Upload to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Use the Env vars we set in the "Get Release Details" step
          TAG: ${{ env.TAG }}
          URL: ${{ env.URL }}
        run: |
          cd release_assets
          
          # Define the reusable upload function
          upload_telegram() {
            FILE_NAME="$1"
            BUILD_LABEL="$2"
          
            if [ -f "$FILE_NAME" ]; then
              echo "✅ Found $FILE_NAME, uploading..."
          
              CAPTION="🚀 *New Release of Atmo Engine*

              🏷 *Tag:* $TAG
              📂 *Build:* $BUILD_LABEL

              🔗 [View on GitHub]($URL)"
          
              # Send to Telegram
              curl -s -F "chat_id=$CHAT_ID" \
                   -F document=@"$FILE_NAME" \
                   -F parse_mode=Markdown \
                   -F caption="$CAPTION" \
                   https://api.telegram.org/bot$BOT_TOKEN/sendDocument
            else
              echo "⚠️ File $FILE_NAME not found in release assets."
            fi
          }

          # Trigger uploads
          upload_telegram "app-release-android-16+.apk" "🌟 Android 16+"
          upload_telegram "app-release-android-13+.apk" "📱 Android 13+"