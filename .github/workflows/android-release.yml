name: Android Release

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Extract Build Metadata
        id: meta
        run: |
          # Extract Version Name
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | awk -F\" '{print $2}')
          echo "Found Version Name: $VERSION_NAME"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          
          # Extract Build Tools Version
          BUILD_TOOLS=$(grep "buildToolsVersion =" app/build.gradle.kts | awk -F\" '{print $2}')
          echo "Found Build Tools: $BUILD_TOOLS"
          echo "BUILD_TOOLS_VERSION=$BUILD_TOOLS" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install Android Build Tools
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;${{ env.BUILD_TOOLS_VERSION }}"

      - name: Build SDK 36 (High)
        run: ./gradlew assembleV36Release

      - name: Sign SDK 36 APK
        uses: ilharp/sign-android-release@v2
        id: sign_app_36
        with:
          releaseDir: app/build/outputs/apk/v36/release
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: ${{ env.BUILD_TOOLS_VERSION }}

      - name: Rename SDK 36 APK
        run: |
          mv "${{ steps.sign_app_36.outputs.signedFile }}" ./app-release-android-16+.apk

      - name: Build SDK 33 (Legacy)
        run: ./gradlew assembleV33Release

      - name: Sign SDK 33 APK
        uses: ilharp/sign-android-release@v2
        id: sign_app_33
        with:
          releaseDir: app/build/outputs/apk/v33/release
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: ${{ env.BUILD_TOOLS_VERSION }}

      - name: Rename SDK 33 APK
        run: |
          mv "${{ steps.sign_app_33.outputs.signedFile }}" ./app-release-android-13+.apk

      - name: Force Create/Update Tag
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          # -f forces the tag to move if it already exists
          git tag -fa v${{ env.VERSION_NAME }} -m "Release v${{ env.VERSION_NAME }}"
          git push origin v${{ env.VERSION_NAME }} --force

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Release v${{ env.VERSION_NAME }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            app-release-android-16+.apk
            app-release-android-13+.apk

      - name: Upload Both APKs to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Find all signed APKs in the build output
          find app/build/outputs/apk -name "*-signed.apk" | while read apk; do

            FILENAME=$(basename "$apk")

            # Identify which flavor is being uploaded
            if [[ "$FILENAME" == *"preview"* ]]; then
               VERSION_LABEL="🌟 Android 16+ (Preview Version)"
            else
               VERSION_LABEL="📱 Android 13+ (Standard Version)"
            fi

            echo "Uploading $FILENAME to Telegram..."

            # Construct the message caption
            CAPTION="🚀 *New Release: Atmosphere Effect*

            🏷 *Tag:* ${{ github.event.release.tag_name }}
            📂 *Build:* $VERSION_LABEL

            📝 *Notes:*
            ${{ github.event.release.body }}

            🔗 [View on GitHub](${{ github.event.release.html_url }})"

            # Send file to Telegram via API
            curl -v -F "chat_id=$CHAT_ID" \
            -F document=@"$apk" \
            -F parse_mode=Markdown \
            -F caption="$CAPTION" \
            https://api.telegram.org/bot$BOT_TOKEN/sendDocument
          done