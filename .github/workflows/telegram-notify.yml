name: Telegram Notification

on:
  workflow_run:
    workflows: ["Android Release"]
    branches: [master]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Release Details
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view --json tagName > release_info.json
          TAG=$(jq -r .tagName release_info.json)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Send, Unpin Old, & Pin New
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ env.TAG }}
          REPO: ${{ github.repository }}
        run: |
          # 1. Construct Links & Message
          LINK_16="https://github.com/$REPO/releases/download/$TAG/app-release-android-16+.apk"
          LINK_13="https://github.com/$REPO/releases/download/$TAG/app-release-android-13+.apk"

          MESSAGE="🚀 <b>New Release: $TAG</b>

          ⬇️ <b>Click to Download:</b>
          • <a href=\"$LINK_16\">Android 16+</a>
          • <a href=\"$LINK_13\">Android 13+</a>"

          # 2. Send Message & Capture Response
          # We save the JSON response to a variable so we can extract the Message ID
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
               -d chat_id="$CHAT_ID" \
               -d parse_mode="HTML" \
               -d disable_web_page_preview="true" \
               --data-urlencode "text=$MESSAGE")

          # 3. Extract the New Message ID
          # 'jq' parses the JSON to find result.message_id
          MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.result.message_id')
          
          echo "✅ Message sent. ID: $MESSAGE_ID"

          # 4. Unpin All Previous Messages
          # This removes old pins so only the new one remains
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/unpinAllChatMessages?chat_id=$CHAT_ID"
          echo "🗑️ Old pins removed."

          # 5. Pin the New Message
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/pinChatMessage" \
               -d chat_id="$CHAT_ID" \
               -d message_id="$MESSAGE_ID"
          
          echo "📌 New release pinned!"