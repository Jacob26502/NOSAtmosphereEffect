name: Telegram Notification

on:
  workflow_run:
    workflows: ["Android Release"]
    branches: [master]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Release Details
        id: get_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch tag of the LATEST release
          gh release view --json tagName > release_info.json
          TAG=$(jq -r .tagName release_info.json)
          
          echo "Found latest release: $TAG"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.TAG }} --dir ./release_assets

      - name: Upload to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ env.TAG }}
          REPO: ${{ github.repository }}
        run: |
          # 1. Construct Direct Download Links
          # GitHub release assets follow this standard URL pattern
          LINK_16="https://github.com/$REPO/releases/download/$TAG/app-release-android-16+.apk"
          LINK_13="https://github.com/$REPO/releases/download/$TAG/app-release-android-13+.apk"

          # 2. Define the Simplified Caption (HTML format)
          CAPTION="🚀 <b>New release: $TAG</b>

          <b>Links of the APKs:</b>
          • <a href=\"$LINK_16\">Android 16+ Link</a>
          • <a href=\"$LINK_13\">Android 13+ Link</a>"

          # 3. Upload Function
          upload_telegram() {
            FILE_NAME="$1"
            FILE_PATH="./release_assets/$FILE_NAME"
          
            if [ -f "$FILE_PATH" ]; then
              echo "🚀 Uploading $FILE_NAME..."
          
              # Send file with the simplified caption
              curl -s -F "chat_id=$CHAT_ID" \
                   -F document=@"$FILE_PATH" \
                   -F parse_mode=HTML \
                   -F caption="$CAPTION" \
                   https://api.telegram.org/bot$BOT_TOKEN/sendDocument
            else
              echo "⚠️ File $FILE_PATH not found."
            fi
          }

          # 4. Trigger Uploads
          upload_telegram "app-release-android-16+.apk"
          upload_telegram "app-release-android-13+.apk"