name: Telegram Notification

on:
  workflow_run:
    workflows: ["Android Release"]
    branches: [master]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Release Details
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch the tag of the newly created release
          gh release view --json tagName > release_info.json
          TAG=$(jq -r .tagName release_info.json)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Send Download Links
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ env.TAG }}
          REPO: ${{ github.repository }}
        run: |
          # 1. Construct Direct Download Links
          # These links trigger an immediate download when clicked
          LINK_16="https://github.com/$REPO/releases/download/$TAG/app-release-android-16+.apk"
          LINK_13="https://github.com/$REPO/releases/download/$TAG/app-release-android-13+.apk"

          # 2. Construct the Message (HTML)
          MESSAGE="🚀 <b>New Release: $TAG</b>

          ⬇️ <b>Click to Download:</b>
          • <a href=\"$LINK_16\">Android 16+</a>
          • <a href=\"$LINK_13\">Android 13+</a>"

          # 3. Send to Telegram
          # We use --data-urlencode to safely handle newlines and special characters
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
               -d chat_id="$CHAT_ID" \
               -d parse_mode="HTML" \
               -d disable_web_page_preview="true" \
               --data-urlencode "text=$MESSAGE"