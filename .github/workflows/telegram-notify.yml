name: Telegram Notification (DEBUG MODE)

on:
  workflow_run:
    workflows: ["Android Release"]
    branches: [master]
    types:
      - completed

jobs:
  debug_notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 1. Get Release Tag
        id: get_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "--- 🔍 FETCHING TAG ---"
          gh release view --json tagName > release_info.json
          TAG=$(jq -r .tagName release_info.json)
          echo "Found Tag: $TAG"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: 2. Download & Verify Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "--- 📥 DOWNLOADING ASSETS ---"
          gh release download ${{ env.TAG }} --dir ./release_assets
          
          echo "--- 📂 DIRECTORY CONTENTS ---"
          ls -lh ./release_assets/

      - name: 3. Attempt Upload with Logging
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ env.TAG }}
        run: |
          # Debug Function
          debug_upload() {
            FILE_NAME="$1"
            FILE_PATH="./release_assets/$FILE_NAME"
          
            echo "========================================================"
            echo "🚀 STARTING UPLOAD: $FILE_NAME"

            if [ ! -f "$FILE_PATH" ]; then
              echo "❌ CRITICAL ERROR: File not found at $FILE_PATH"
              return
            fi

            # Simple caption to avoid formatting errors during debug
            CAPTION="Debug Upload: $FILE_NAME (Tag: $TAG)"

            # Run CURL and capture the output to a file (response.json)
            # -v: Verbose (shows connection details)
            HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
              -F "chat_id=$CHAT_ID" \
              -F "document=@$FILE_PATH" \
              -F "caption=$CAPTION" \
              https://api.telegram.org/bot$BOT_TOKEN/sendDocument)

            echo "📡 HTTP Status Code: $HTTP_STATUS"
            echo "📄 Raw Telegram Response:"
            cat response.json
            echo ""
            echo "========================================================"
          }

          # Try to upload both files
          debug_upload "app-release-android-16+.apk"
          debug_upload "app-release-android-13+.apk"